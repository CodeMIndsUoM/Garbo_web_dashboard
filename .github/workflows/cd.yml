name: CD

# Deploy frontend only. Requires AWS secrets in THIS repo (Garbo_web_dashboard).
# Full-stack deploy: use Garbo-infra "Deploy Full Stack" workflow.

on:
  workflow_dispatch:
  push:
    branches:
      - devops/platform

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 392202704441.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: garbo-frontend
  EC2_INSTANCE_ID: i-0cc6c206c6c34456c

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
        run: |
          API_BASE="${NEXT_PUBLIC_API_BASE%/api}"
          API_BASE="${API_BASE%/}"
          TAG="${GITHUB_SHA}"
          docker build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_BASE="${API_BASE}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to EC2 via SSM
        run: |
          DEPLOY_SCRIPT="bash -lc 'cd /opt/garbo && set -a && source .env.deploy && set +a && BACKEND_TAG=latest FRONTEND_TAG=${GITHUB_SHA} ./scripts/deploy.sh'"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Garbo frontend deploy ${GITHUB_SHA}" \
            --parameters "commands=[\"$DEPLOY_SCRIPT\"]" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM command id: $COMMAND_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "Deploy status ($i/60): $STATUS"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "[StatusDetails,StandardOutputContent,StandardErrorContent]" \
                  --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Deploy timed out waiting for SSM command"
          exit 1
