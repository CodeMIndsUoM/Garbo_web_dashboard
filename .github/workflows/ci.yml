name: CI

on:
  pull_request:
    branches:
      - mergekth
      - main
  push:
    branches:
      - devops/**
      - mergekth

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8081
        run: npm run build

      - name: Build Docker image
        run: docker build -t garbo-frontend:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: garbo-frontend:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
